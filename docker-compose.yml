version: '3.9'

services:
  db:
    image: mysql:9.7.0-oraclelinux9
    container_name: platform_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: platform_api
    restart: always
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db

  nginx:
    image: nginx:1.31.1
    container_name: platform_nginx
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./volumes/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: platform_ngrok
    profiles: ["ngrok"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http nginx:80
    depends_on:
      - nginx
